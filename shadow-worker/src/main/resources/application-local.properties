spring.datasource.url=jdbc:mysql://localhost:3306/llm_shadow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=llm_shadow
spring.datasource.password=llm_shadow
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.kafka.bootstrap-servers=localhost:9092

app.primary-llm.base-url=${DO_PRIMARY_LLM_BASE_URL:https://inference.do-ai.run/v1/chat/completions}
app.primary-llm.auth-token=${DO_MODEL_ACCESS_KEY}
app.primary-llm.default-model=llama3.3-70b-instruct
app.primary-llm.connect-timeout-ms=5000
app.primary-llm.read-timeout-ms=30000

app.candidate-llm.base-url=${DO_CANDIDATE_LLM_BASE_URL:https://inference.do-ai.run/v1/chat/completions}
app.candidate-llm.auth-token=${DO_MODEL_ACCESS_KEY}
app.candidate-llm.default-model=openai-gpt-oss-20b
app.candidate-llm.connect-timeout-ms=5000
app.candidate-llm.read-timeout-ms=30000
