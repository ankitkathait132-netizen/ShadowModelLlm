# DigitalOcean managed resources
# Region: blr1
# MySQL cluster: llm-shadow-mysql (2d813bb8-f5f4-49de-9e3b-fbfdbb0ecd48)
# Kafka cluster: llm-shadow-kafka (d334943c-de79-4bca-beaa-b0d88499685a)
# Kafka shape: gd-2vcpu-8gb x 6 brokers, 6 partitions per topic
# LLM test models use DigitalOcean Serverless Inference.

spring.jpa.show-sql=false

# Managed MySQL
# Set DO_MYSQL_JDBC_URL to the DigitalOcean JDBC URL, for example:
# jdbc:mysql://<host>:<port>/llm_shadow?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.url=${DO_MYSQL_JDBC_URL}
spring.datasource.username=${DO_MYSQL_USERNAME:llm_shadow}
spring.datasource.password=${DO_MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Managed Kafka
spring.kafka.bootstrap-servers=${DO_KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.properties.security.protocol=${DO_KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${DO_KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${DO_KAFKA_USERNAME}" password="${DO_KAFKA_PASSWORD}";
spring.kafka.properties.ssl.endpoint.identification.algorithm=${DO_KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:}
spring.kafka.ssl.trust-store-location=file:${DO_KAFKA_TRUSTSTORE_LOCATION}
spring.kafka.ssl.trust-store-password=${DO_KAFKA_TRUSTSTORE_PASSWORD}
spring.kafka.ssl.trust-store-type=JKS

# Kafka topics
app.kafka.topics.shadow-requests=llm-shadow-requests
app.kafka.topics.shadow-retry=llm-shadow-requests-retry
app.kafka.topics.shadow-dlq=llm-shadow-requests-dlq

# DigitalOcean Serverless Inference test models
# The current LLM clients forward the request payload unchanged, so production
# requests should include an OpenAI-compatible body with the matching model ID.
# Both models are DigitalOcean-hosted (owned_by=digitalocean in /v1/models), unlike
# OpenAI/Anthropic-branded models (e.g. openai-gpt-4o-mini) which require a higher
# DigitalOcean subscription/billing tier and return 403 "not available for your
# subscription tier" otherwise.
app.primary-llm.base-url=${DO_PRIMARY_LLM_BASE_URL:https://inference.do-ai.run/v1/chat/completions}
app.primary-llm.auth-token=${DO_MODEL_ACCESS_KEY}
app.primary-llm.default-model=llama3.3-70b-instruct
app.primary-llm.connect-timeout-ms=5000
app.primary-llm.read-timeout-ms=30000

app.candidate-llm.base-url=${DO_CANDIDATE_LLM_BASE_URL:https://inference.do-ai.run/v1/chat/completions}
app.candidate-llm.auth-token=${DO_MODEL_ACCESS_KEY}
app.candidate-llm.default-model=openai-gpt-oss-20b
app.candidate-llm.connect-timeout-ms=5000
app.candidate-llm.read-timeout-ms=30000
